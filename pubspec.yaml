name: kyorang_talk
description: 교랑톡 - 교랑 채팅 앱
publish_to: 'none'
version: 1.0.0+12

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Supabase
  supabase_flutter: ^2.5.0
  # 상태관리
  flutter_riverpod: ^2.5.1
  # 라우팅
  go_router: ^13.2.0
  # Google 로그인
  google_sign_in: ^6.2.1
  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1            # ⭐ NEW — 세리프 폰트용 (스플래시 등)
  # 유틸
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  dio: ^5.4.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  media_scanner: ^2.2.1
  firebase_auth: ^5.3.0
  intl_phone_field: ^3.2.0
  url_launcher: ^6.2.1            # 문의 이메일용
  package_info_plus: 9.0.1       # 버전 자동 로드
  record: ^6.2.0
  just_audio: ^0.10.5
  open_filex: ^4.4.0     # ⭐ 파일 열기
  http: ^1.2.0           # ⭐ 진행률 다운로드
  purchases_flutter: ^8.2.0  # ⭐ 추가
  flutter_image_compress: ^2.3.0
  gal: ^2.3.0
  share_plus: ^10.0.0
  app_links: ^6.3.0
  html: ^0.15.4
  agora_rtc_engine: ^6.5.0
  flutter_callkit_incoming: ^2.5.2
  sentry_flutter: ^9.20.0
  in_app_purchase: ^3.2.0
  local_auth: ^2.3.0
  crypto: ^3.0.3
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  youtube_player_iframe: ^5.2.0
  flutter_foreground_task: ^8.17.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  archive: ^3.6.1
  google_mobile_ads: ^5.2.0

  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.14.1   # ⭐ 추가

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/                  # ⭐ 추가

# ═══════════════════════════════════════════════════
# ⭐ 앱 아이콘 자동 생성 설정
# ═══════════════════════════════════════════════════
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  # 적응형 아이콘 (Android 8+)
  adaptive_icon_background: "#2A0441"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

# ═══════════════════════════════════════════════════
# ⭐ 스플래시 화면 (새 로고로 변경)
# ═══════════════════════════════════════════════════
flutter_native_splash:
  # 배경색 - 검정
  color: "#000000"

  # 중앙 로고
  image: assets/icon/splash.png

  # Android 12+ 전용 (적응형 아이콘처럼 동작)
  android_12:
    color: "#000000"
    image: assets/icon/splash_android12.png

  # 플랫폼
  android: true
  ios: false
  web: false

  # 풀스크린
  fullscreen: true

  # 가로 모드 비활성화
  android_screen_orientation: portrait
name: kyorang_talk
description: 교랑톡 - 교랑 채팅 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Supabase
  supabase_flutter: ^2.5.0
  # 상태관리
  flutter_riverpod: ^2.5.1
  # 라우팅
  go_router: ^13.2.0
  # Google 로그인
  google_sign_in: ^6.2.1
  # UI
  cached_network_image: ^3.3.1
  # 유틸
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  dio: ^5.4.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  media_scanner: ^2.2.1
  firebase_auth: ^5.3.0
  intl_phone_field: ^3.2.0
  url_launcher: ^6.2.1            # 문의 이메일용
  package_info_plus: 9.0.1       # 버전 자동 로드
  record: ^6.2.0
  just_audio: ^0.10.5
  open_filex: ^4.4.0     # ⭐ 파일 열기
  http: ^1.2.0           # ⭐ 진행률 다운로드
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/


flutter_native_splash:
  # ═══ 그라데이션 배경 이미지 사용 ═══
  background_image: "assets/images/splash_bg.png"
  
  # ═══ 중앙 로고 ═══
  image: assets/images/logo.png
  
  # ═══ Android 12+ 전용 ═══
  android_12:
    image: assets/images/logo.png
    color: "#080810"
  
  # ═══ 플랫폼 ═══
  android: true
  ios: true
  web: false
  
  # ═══ 풀스크린 (상태바까지 배경색) ═══
  fullscreen: true
  
  # ═══ 가로 모드 비활성화 ═══
  android_screen_orientation: portrait